version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Generating Prisma client..."
      - npx prisma generate

  build:
    commands:
      - echo "Building Next.js app..."
      - npm run build

artifacts:
  files:
    - '**/*'
  base-directory: '.'
  exclude-paths:
    - node_modules/**/*
    - .git/**/*

cache:
  paths:
    - node_modules/**/*
